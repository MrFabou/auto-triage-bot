name: 'Auto-Triage-Bot'
description: 'Automatically labels and comments on new issues and pull requests based on keyword analysis.'
author: 'Auto-Triage-Bot'

inputs:
  github-token:
    description: 'GitHub token used to add labels and post comments.'
    required: true
    default: ${{ github.token }}
  label-rules:
    description: |
      Optional JSON string that defines custom keyword-to-label rules.
      Format: [{"label":"bug","keywords":["crash","error"]}]
      When omitted the built-in defaults are used.
    required: false
    default: ''

runs:
  using: 'node20'
  main: 'dist/index.js'

branding:
  icon: 'tag'
  color: 'blue'
